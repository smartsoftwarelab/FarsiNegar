<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فارسی‌نگار</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
      @import url('https://fonts.googleapis.com/css2?family=Estedad:wght@100..900&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Lalezar&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Sahel:wght@400;700&display=swap');

      :root {
          --bg-color: #f8f9fa;
          --paper-color: #FFFFFF;
          --text-color: #374151;
          --primary-color: #f43f5e;
          --icon-color: #e11d48;
      }

      body {
          font-family: 'Estedad', sans-serif;
          background-color: var(--bg-color);
          color: var(--text-color);
          padding-top: 5rem;
      }

      .card { background-color: var(--paper-color); border-color: rgba(229, 231, 235, 0.5); }
      .primary-text { color: var(--primary-color); }
      .headline-font { font-family: 'Lalezar', sans-serif; }
      .app-button { transition: all 0.3s; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
      .floating-header { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }

      .floating-letters-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
      .floating-letter { position: absolute; opacity: 0.18; animation: floatUp 12s linear infinite; user-select: none; white-space: nowrap; }

      @keyframes floatUp {
          0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
          15% { opacity: 0.25; }
          40% { opacity: 0.35; }
          70% { opacity: 0.22; }
          100% { transform: translateY(-20vh) translateX(40px) rotate(12deg); opacity: 0; }
      }
  </style>

  <script>
      // انیمیشن حروف شناور
      document.addEventListener("DOMContentLoaded", () => {
          const container = document.createElement("div");
          container.className = "floating-letters-container";
          document.body.prepend(container);
          const letters = "ابپتثجچحخدذرزسشصضطظعغفقکگلمنوهی";
          const fonts = ["Lalezar", "Estedad", "Sahel", "Vazirmatn"];
          const colors = ["#f43f5e", "#e11d48", "#a855f7", "#ec4899", "#fb923c"];

          for (let i = 0; i < 45; i++) {
              const span = document.createElement("span");
              span.className = "floating-letter";
              span.innerText = letters[Math.floor(Math.random() * letters.length)];
              span.style.left = Math.random() * 100 + "vw";
              span.style.fontSize = (Math.random() * 35 + 15) + "px";
              span.style.animationDuration = (10 + Math.random() * 14) + "s";
              span.style.animationDelay = (-Math.random() * 20) + "s";
              span.style.transform = `rotate(${(Math.random() * 20) - 10}deg)`;
              span.style.color = colors[Math.floor(Math.random() * colors.length)];
              span.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
              container.appendChild(span);
          }
      });
  </script>
</head>

<body class="bg-gray-50">
<div id="app" class="min-h-screen flex flex-col relative overflow-hidden"></div>

<script>
    // --- 1. LLM API & Logic (اصلاح شده برای کار با Django) ---
    let isProcessing = false;
    const initialDemoText = "ما ديروز تصميم گرفتيم كه بريم به یک باغ زيبا. هوا خيلي خوب بود. اما، يكمي هم ابري بود.";

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function handleRefineText(input) {
        if (isProcessing) return;
        isProcessing = true;

        const resultTextarea = document.getElementById('demo-result');
        const refineButton = document.getElementById('refine-button');

        refineButton.disabled = true;
        refineButton.innerHTML = `<i data-lucide="loader-circle" size="20" class="inline-block animate-spin -mt-1 ml-2"></i> در حال پردازش...`;
        resultTextarea.value = "فارسی‌نگار متن شما را پردازش می‌کند...";
        lucide.createIcons();

        try {
            const response = await fetch('/refine-text-endpoint/', { // این آدرس باید در urls.py باشد
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ input_text: input.trim() })
            });

            const data = await response.json();
            if (data.success) {
                resultTextarea.value = data.refined_text.trim();
            } else {
                resultTextarea.value = "خطا در دریافت پاسخ: " + data.error;
            }
        } catch (error) {
            resultTextarea.value = "خطا در برقراری ارتباط با سرور.";
        }

        refineButton.disabled = false;
        refineButton.innerHTML = `<i data-lucide="sparkles" size="20" class="inline-block -mt-1 ml-2"></i> اصلاح متن`;
        isProcessing = false;
        lucide.createIcons();
    }
