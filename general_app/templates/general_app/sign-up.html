{% extends "base.html" %}

{% block title %}ثبت نام در فارسی‌نگار{% endblock %}

{% block body-content %}
<main class="max-w-md mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="p-8">
        <h1 class="text-3xl font-extrabold mb-6 headline-font primary-text text-center">ثبت نام</h1>

        <form method="POST" action="#">
            {% csrf_token %}
            <div class="space-y-6">

                {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit"
                    class="app-button w-full px-6 py-3 rounded-full font-bold text-white transition duration-150 text-base"
                    style="background-color: var(--icon-color);"
                >
                    ثبت نام
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            قبلاً حساب کاربری داشته‌اید؟
            <a href="{% url 'sign-in' %}" class="font-medium primary-text hover:text-rose-700 transition-colors">
                وارد شوید
            </a>
        </p>
    </div>
</main>
{% endblock %}
