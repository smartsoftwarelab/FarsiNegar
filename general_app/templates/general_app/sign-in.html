{% extends "base.html" %}

{% block title %}ورود به فارسی‌نگار{% endblock %}

{% block body-content %}
<main class="max-w-md mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="p-8">
        <h1 class="text-3xl font-extrabold mb-6 headline-font primary-text text-center">ورود</h1>

        <form method="POST" action="#">
            {% csrf_token %}
            <div class="space-y-6">

                <div>
                    <label for="user_email" class="block text-sm font-medium text-gray-700 mb-1">آدرس ایمیل</label>
                    <input type="email" id="user_email" name="user_email" required
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500"
                           placeholder="example@email.com">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="user_password" class="block text-sm font-medium text-gray-700">رمز عبور</label>
                        <a href="#" class="text-xs primary-text hover:underline text-rose-600">فراموشی رمز عبور؟</a>
                    </div>
                    <input type="password" id="user_password" name="user_password" required
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-rose-500 focus:border-rose-500"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember_me" name="remember_me"
                           class="h-4 w-4 text-rose-600 focus:ring-rose-500 border-gray-300 rounded">
                    <label for="remember_me" class="block text-sm text-gray-900">
                        مرا به خاطر بسپار
                    </label>
                </div>

                <button type="submit"
                    class="app-button w-full px-6 py-3 rounded-full font-bold text-white transition duration-150 text-base"
                    style="background-color: var(--icon-color);"
                >
                    ورود به حساب
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            هنوز ثبت‌نام نکرده‌اید؟
            <a href="{% url 'sign-up' %}" class="font-medium primary-text hover:text-rose-700 transition-colors">
                ایجاد حساب جدید
            </a>
        </p>
    </div>
</main>
{% endblock %}
